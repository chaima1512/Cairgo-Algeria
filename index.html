
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CAIRGO Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <img src="logo.png" alt="CAIRGO Logo" class="logo" />
    <h1>Dashboard CAIRGO</h1>
  </header>
  <main>
    <section class="kpi">
      <div class="card green">On-Time Flights: 92.3%</div>
      <div class="card blue">Load Factor: 68.4%</div>
      <div class="card orange">Cargo Weight: 1452t</div>
    </section>
    <section class="map">
      <h2>Vol en cours : 7T-VJJ</h2>
      <p>Départ : Alger (ALG) → Destination : Paris (CDG)</p>
      <div class="fake-map">[ Carte de suivi ici ]</div>
    </section>
    <section class="assistant">
      <h2>Assistant Virtuel</h2>
      <button>Suivre un colis</button>
      <button>Horaires de vol</button>
      <button>Réclamations</button>
      <button>Météo</button>
    </section>
  </main>
</body>
</html>
